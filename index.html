<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>❤️ 老婆点餐系统（下厨房全菜品）</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
    body{background:#fff5f7;padding:15px;max-width:600px;margin:0 auto}
    .header{text-align:center;padding:10px 0 20px}
    .title{font-size:24px;color:#e64980;font-weight:700}
    .tips{font-size:13px;color:#999;margin-top:5px}
    .category{display:flex;overflow-x:auto;gap:10px;padding-bottom:10px;margin-bottom:15px}
    .cat{padding:8px 14px;background:#fff;border-radius:20px;white-space:nowrap;font-size:14px;box-shadow:0 1px 3px rgba(0,0,0,.1);cursor:pointer}
    .cat.active{background:#e64980;color:#fff}
    .foods{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:25px}
    .food{background:#fff;border-radius:14px;padding:14px 10px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.05);cursor:pointer;border:2px solid transparent;font-size:15px}
    .food.active{border-color:#e64980;background:#fff0f4;color:#e64980;font-weight:700}
    .order{background:#fff;border-radius:16px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
    .order-title{font-size:18px;color:#e64980;margin-bottom:12px;font-weight:700}
    .order-list{min-height:70px;background:#fafafa;border-radius:12px;padding:12px;margin-bottom:12px}
    .order-empty{text-align:center;color:#ccc;padding:10px 0;font-size:14px}
    .order-item{padding:6px 0;font-size:15px;border-bottom:1px solid #f2f2f2}
    textarea{width:100%;height:75px;border-radius:12px;border:1px solid #eee;padding:12px;font-size:14px;resize:none;margin-bottom:15px}
    .submit{width:100%;background:#e64980;color:#fff;border:none;border-radius:14px;padding:15px;font-size:16px;font-weight:700;cursor:pointer}
    .footer{text-align:center;font-size:12px;color:#999;margin-top:10px}
  </style>
</head>
<body>

<div class="header">
  <div class="title">❤️ 老婆今天想吃什么</div>
  <div class="tips">下厨房全菜品 · 点完提交，老公马上做</div>
</div>

<div class="category" id="category"></div>
<div class="foods" id="foods"></div>

<div class="order">
  <div class="order-title">📝 今日菜单</div>
  <div class="order-list" id="orderList"></div>
  <textarea id="remark" placeholder="口味要求：少盐、微辣、不吃葱、软烂一点…"></textarea>
  <button class="submit" id="submit">✅ 提交点餐（老公收到）</button>
  <div class="footer">每天 00:00 自动清空，方便第二天点餐</div>
</div>

<script>
// ====================== 下厨房 官方全部分类 + 真实菜品 ======================
const data = {
  "家常菜": ["番茄炒蛋","青椒肉丝","酸辣土豆丝","红烧肉","可乐鸡翅","鱼香肉丝","宫保鸡丁","麻婆豆腐","蒜蓉西兰花","香菇青菜","小炒黄牛肉","韭菜炒鸡蛋","地三鲜","干锅包菜","荷塘月色","木须肉","回锅肉","小炒肉","蒜香排骨","土豆烧牛肉"],
  "下饭菜": ["麻婆豆腐","鱼香肉丝","宫保鸡丁","酸辣土豆丝","小炒黄牛肉","红烧肉","茄子烧豆角","辣椒炒肉","香菇滑鸡","蒜苔炒肉","剁椒鱼头","酸豆角肉末","红烧茄子","农家一碗香","干锅花菜"],
  "肉类": ["红烧肉","可乐鸡翅","糖醋排骨","青椒肉丝","宫保鸡丁","小炒黄牛肉","蒜香排骨","土豆烧牛肉","红烧鸡腿","卤鸡腿","酱牛肉","水煮牛肉","回锅肉","东坡肉","梅菜扣肉","粉蒸肉","红烧猪蹄","孜然羊肉","葱爆羊肉","黄焖鸡"],
  "素菜": ["酸辣土豆丝","蒜蓉西兰花","清炒油麦菜","清炒上海青","香菇青菜","干锅包菜","荷塘月色","红烧茄子","地三鲜","炒藕片","炒丝瓜","炒西葫芦","蒜蓉娃娃菜","清炒茼蒿","凉拌黄瓜","凉拌西红柿","炒豆角","炒空心菜","炒生菜","炒菠菜"],
  "汤羹": ["紫菜蛋花汤","西红柿鸡蛋汤","冬瓜排骨汤","玉米排骨汤","萝卜排骨汤","香菇鸡汤","丝瓜蛋汤","青菜豆腐汤","皮蛋瘦肉汤","海带排骨汤","山药排骨汤","银耳汤","小米粥","南瓜粥","绿豆汤","鸡蛋羹","豆腐羹","香菇豆腐汤","番茄豆腐汤","猪肚鸡汤"],
  "海鲜": ["清蒸鱼","红烧鱼","酸菜鱼","水煮鱼","蒜蓉虾","白灼虾","油焖大虾","清蒸螃蟹","炒花蛤","炒蛏子","蒜蓉粉丝扇贝","红烧带鱼","香煎鳕鱼","清蒸鲈鱼","红烧鲈鱼","爆炒鱿鱼","虾仁滑蛋","虾仁豆腐","蒜蓉生蚝","清蒸生蚝"],
  "蛋类": ["番茄炒蛋","韭菜炒鸡蛋","炒鸡蛋","荷包蛋","蒸蛋羹","虾仁滑蛋","青椒炒蛋","苦瓜炒蛋","洋葱炒蛋","木耳炒蛋","黄瓜炒蛋","葱花炒蛋","紫菜蛋花汤","西红柿鸡蛋汤","丝瓜蛋汤","卤蛋","茶叶蛋","皮蛋","咸蛋","蛋炒饭"],
  "主食": ["蛋炒饭","扬州炒饭","炒面","炒米粉","炒河粉","葱油拌面","阳春面","炸酱面","饺子","馄饨","包子","馒头","花卷","煎饼","手抓饼","鸡蛋饼","葱油饼","粥","米饭","杂粮饭"],
  "凉菜": ["凉拌黄瓜","凉拌西红柿","凉拌木耳","凉拌海带丝","凉拌豆腐丝","凉拌粉丝","凉拌藕片","凉拌土豆丝","凉拌金针菇","拍黄瓜","盐水花生","盐水毛豆","卤豆干","卤鸡蛋","酱萝卜","泡菜","糖蒜","凉皮","凉面","凉粉"],
  "快手菜": ["番茄炒蛋","炒青菜","酸辣土豆丝","蒜蓉西兰花","韭菜炒蛋","黄瓜炒蛋","洋葱炒蛋","木耳炒蛋","荷包蛋","紫菜蛋花汤","凉拌黄瓜","拍黄瓜","炒豆芽","炒蘑菇","炒香菇","炒杏鲍菇","炒木耳","炒山药","炒莴笋","炒芦笋"]
};

// ====================== 每日自动清空 ======================
function checkNewDay(){const t=new Date().toDateString(),l=localStorage.getItem("lastDay");t!==l&&(localStorage.clear(),localStorage.setItem("lastDay",t))}
checkNewDay();

// ====================== 初始化 ======================
let selected = JSON.parse(localStorage.getItem('order')||'[]');
const remark = document.getElementById('remark');
remark.value = localStorage.getItem('remark')||'';

// 渲染分类
const catEl = document.getElementById('category');
Object.keys(data).forEach((c, i) => {
  const d = document.createElement('div');
  d.className = 'cat' + (i===0?' active':'');
  d.innerText = c;
  d.onclick = () => {
    document.querySelector('.cat.active').classList.remove('active');
    d.classList.add('active');
    renderFood(c);
  };
  catEl.appendChild(d);
});

// 渲染菜品
function renderFood(cat){
  const fEl = document.getElementById('foods');
  fEl.innerHTML = '';
  data[cat].forEach(name => {
    const div = document.createElement('div');
    div.className = 'food' + (selected.includes(name)?' active':'');
    div.innerText = name;
    div.onclick = () => {
      selected.includes(name)
        ? (selected = selected.filter(x=>x!==name), div.classList.remove('active'))
        : (selected.push(name), div.classList.add('active'));
      renderOrder();
    };
    fEl.appendChild(div);
  });
}

// 渲染订单
function renderOrder(){
  const ol=document.getElementById('orderList');
  if(selected.length===0){ol.innerHTML='<div class="order-empty">还没选菜～</div>';return}
  ol.innerHTML=selected.map(n=>`<div class="order-item">✅ ${n}</div>`).join('');
}

// 提交
document.getElementById('submit').onclick=()=>{
  if(selected.length===0)return alert('先选几个菜呀❤️');
  localStorage.setItem('order',JSON.stringify(selected));
  localStorage.setItem('remark',remark.value);
  alert('点餐成功！老公马上安排🥰');
};

// 首次加载
renderFood(Object.keys(data)[0]);
renderOrder();
</script>
</body>
</html>>
